name: CI-PR Advertise

on:
  workflow_run: # zizmor: ignore[dangerous-triggers] privileged follow-up only reads CI metadata/artifacts and comments; it never checks out or runs PR code
    workflows: ["CI-PR"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  advertise:
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.pull_requests[0]
      }}
    steps:
      - name: Advertise Feature Preview artifact
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const run = context.payload.workflow_run;
            const pull = run.pull_requests[0];
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pull.number,
            });

            const hasFeaturePreview = pr.labels.some((label) => label.name === "🆕 Feature Preview");
            if (!hasFeaturePreview) {
              core.info("Skipping comment because the pull request is not labeled for Feature Preview.");
              return;
            }

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: run.id,
            });

            const artifact = artifacts.artifacts.find((item) =>
              item.name.startsWith(`WeakAuras-PR#${pull.number}-`)
            );

            if (!artifact) {
              core.info("Skipping comment because no Feature Preview artifact was uploaded.");
              return;
            }

            const marker = "<!-- weakauras-feature-preview -->";
            const body = [
              marker,
              `An experimental build of WeakAuras with the changes in this pull request is available [here](https://nightly.link/${owner}/${repo}/actions/artifacts/${artifact.id}.zip).`,
              `Build Time: ${new Date().toString()}`,
              `Commit: ${run.head_sha}`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pull.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull.number,
                body,
              });
            }

      - name: Send Status to Discord
        uses: nebularg/actions-discord-webhook@633ae6b03882743988dbc992eb147818ca96a93e # v1
        with:
          webhook_url: ${{ secrets.WEBHOOK_URL }}
          status: ${{ job.status }}
        if: failure()
