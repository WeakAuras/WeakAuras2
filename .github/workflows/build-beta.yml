name: CI-Beta

on:
  push:
    branches:
      - dragonflight
    tags:
      - "**-alpha**"
      - "**-beta**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Hack around https://github.com/actions/checkout/issues/290
        run: |
          git fetch --tags --force

      - name: Install and run Luacheck
        uses: nebularg/actions-luacheck@d4137dd840545b28521ed21931e06913d93c0bc1 # v1
        with:
          args: "--no-color -q"
          annotate: warning

      - name: Generate Changelog
        run: ./generate_changelog.sh

      - name: Update Build Date
        run: sed -i "s/@build-time@/`date +%Y%m%d%H%M%S`/" WeakAuras/Init.lua

      - name: Flag Non-Experimental Build
        run: |
          sed -i \
          -e "s/--@experimental@/--\[=====\[@experimental@/" \
          -e "s/--@end-experimental@/--@end-experimental@\]=====\]/" WeakAuras/Init.lua

      - name: Create Package
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: BigWigsMods/packager@36b4c3b7b7bd17c835ad8c83fed4976c067edfbe # master
        with:
          args: -g retail
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          # WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}

      - name: Create Artifact
        if: github.event_name == 'push' && !contains(github.ref, 'refs/tags/')
        uses: BigWigsMods/packager@36b4c3b7b7bd17c835ad8c83fed4976c067edfbe # master
        with:
          args: -zg retail

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: WeakAuras-DF
          path: .release/*.zip
          archive: false

      - name: Send Status to Discord
        uses: nebularg/actions-discord-webhook@633ae6b03882743988dbc992eb147818ca96a93e # v1
        with:
          webhook_url: ${{ secrets.WEBHOOK_URL }}
          status: ${{ job.status }}
        if: failure()
